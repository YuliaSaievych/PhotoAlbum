<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    {#    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">#}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>{% block title %}Photo Book{% endblock %}</title>
</head>
<body>
<header>
    <nav>
        <a href="{{ url_for('general.home') }}" class="logo">Photo Book</a>
        <div class="icons">
            <a href="#" class="icon mail"></a>
            <a href="#" class="icon notifications"></a>
            <a href="#" class="icon menu" onclick="toggleMenu()"></a>
        </div>
        <div id="myMenu">
            <div class="menu-list">
                {% if current_user.is_authenticated %}
                    <div class="menu-item">
                        <a href="{{ url_for('user.account', username=current_user.id) }}">Профіль {{ current_user.username }}</a>
                    </div>
                    <div>
                        <a href="{{ url_for('photo.gallery') }}">Галерея</a>
                    </div>
                    <div class="menu-item">
                        <form action="{{ url_for('auth.logout') }}" method="POST" style="display: inline;">
                            <button type="submit" class="btn-link" style="border:none; background:none;">Вийти</button>
                        </form>

                    </div>
                {% else %}
                    <div class="menu-item">
                        <a href="{{ url_for('auth.login') }}">Вхід</a>
                    </div>
                    <div class="menu-item">
                        <a href="{{ url_for('auth.register') }}">Реєстрація</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </nav>
</header>

<main>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</main>


<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>


</body>
</html>
